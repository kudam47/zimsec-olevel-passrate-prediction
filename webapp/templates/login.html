<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ZIMSEC Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h2>ZIMSEC Analytics</h2>
            <p class="subtitle">Predictive Modelling of O-Level Pass Rates</p>

            {% if error %}
            <div class="alert alert-danger alert-custom mb-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" name="email" placeholder="admin@zimsec.ac.zw"
                        value="admin@zimsec.ac.zw" required>
                    <label for="email"><i class="bi bi-envelope me-2"></i>Email Address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                        required>
                    <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember"
                            style="font-size:0.85rem; color:var(--text-secondary)">
                            Remember session
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-4" style="font-size:0.8rem; color:var(--text-muted)">
                <i class="bi bi-shield-check me-1"></i>
                Protected under Zimbabwe Cyber and Data Protection Act (2021)
            </div>

            <div class="text-center mt-2" style="font-size:0.75rem; color:var(--text-muted)">
                Demo credentials: admin@zimsec.ac.zw / admin123
            </div>
        </div>
    </div>
</body>

</html>
